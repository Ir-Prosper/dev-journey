<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Website</title>
    <link rel="stylesheet" href="/css/restaurant.css" />
  </head>
  <body>
    <!-- Header Section -->
    <header class="flex-header">
      <div class="logo">
        <img src="images/Bella-Cucina-Logo.jpeg" alt="Bella Cucina Logo" />
      </div>
      <!-- Navigation Menu -->
      <div class="navbar">
        <nav class="navbar-menu">
          <a href="#home">Home</a>
          <a href="#menu">Menu</a>
          <a href="#about">About</a>
          <a href="#contact">Contact</a>
        </nav>
      </div>
    </header>

    <!-- Main Content Section -->
    <main>
      <!-- HERO SECTION -->
      <section id="home" class="hero" style="background-image: url('images/hero-bg.jpg');">
        <div class="hero-content">
          <h1>Welcome to Bella Cucina Restaurant</h1>
          <hr />
          <p>From Italy, With Love</p>
          <a href="#menu" class="btn">See Our Menu</a>
        </div>
      </section>
    </main>
  </body>
</html>
